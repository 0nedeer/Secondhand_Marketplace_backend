server:
  port: 8080

spring:
  application:
    name: secondhand-marketplace-backend
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/secondhand_marketplace?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false
    username: root
    password: 
    hikari:
      initialization-fail-timeout: -1

  # Redis 配置
  data:
    redis:
      host: localhost
      port: 6379
      password:
      database: 0
      timeout: 5000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0

# 测试配置
test:
  enabled: false
  default-user-id: 10001
  default-admin-id: 1

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.secondhand.marketplace.backend.modules.*.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl  # 打开 SQL 日志

logging:
  level:
    root: info
    com.secondhand.marketplace.backend: info

# JWT 配置
jwt:
  secret: "mySecretKeyForJWTTokenGeneration2024VeryLongAndSecure123456"
  expiration: 86400000  # 24小时（毫秒）
  reset-expiration: 300000  # 5分钟（毫秒）

# OSS对象存储
minio:
  endpoint: http://218.244.142.223:9000
  accessKey: 7zDjfOTcpJtwdqMzIRU3
  secretKey: U3VcHvAzOAN2RG8wckQ1Hg03vn9M7PtktXWRYaV4
  bucketName: filebucket

# CORS 跨域配置（本地开发环境）
cors:
  allowed:
    origins:
      - http://localhost:3000
      - http://localhost:3001
      - http://localhost:8080
      - http://127.0.0.1:3000
      - http://127.0.0.1:8080