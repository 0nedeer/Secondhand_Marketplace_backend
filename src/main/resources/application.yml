# 公共配置 - 提交到Git
server:
  port: 8080
  tomcat:
    uri-encoding: UTF-8
    max-threads: 200
    min-spare-threads: 10
    connection-timeout: 20000

spring:
  application:
    name: secondhand-marketplace-backend
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
      enabled: true
  
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${DB_URL:jdbc:mysql://localhost:3306/secondhand_marketplace?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
    hikari:
      maximum-pool-size: ${DB_POOL_SIZE:10}
      minimum-idle: ${DB_MIN_IDLE:5}
      connection-timeout: 30000
      initialization-fail-timeout: -1
  
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: ${REDIS_DATABASE:0}
      timeout: 5000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0

# JWT配置
jwt:
  secret: ${JWT_SECRET:defaultSecretKeyChangeInProduction}
  expiration: 86400000
  reset-expiration: 300000

# MinIO配置
minio:
  endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
  accessKey: ${MINIO_ACCESS_KEY:}
  secretKey: ${MINIO_SECRET_KEY:}
  bucketName: ${MINIO_BUCKET:filebucket}

# CORS跨域配置 - 公共配置
cors:
  allowed:
    origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:8080,http://127.0.0.1:3000,http://127.0.0.1:8080}
  public-paths:
    - /api/user/register
    - /api/user/login
    - /api/user/sms-login
    - /api/user/sms/send-code
    - /api/user/forgot-password
    - /api/user/reset-password
    - /api/payments/callback
    - /api/products/public/**
    - /api/products/list
    - /api/products/detail/**
    - /api/forum/public/**
    - /api/forum/posts/list
    - /api/forum/posts/detail/**
    - /swagger-ui/**
    - /v3/api-docs/**
    - /doc.html
    - /swagger-resources/**
    - /webjars/**
    - /error
    - /static/**
    - /uploads/**

# MyBatis-Plus配置
mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.secondhand.marketplace.backend.modules.*.entity
  configuration:
    map-underscore-to-camel-case: true
    cache-enabled: false
    log-impl: ${MYBATIS_LOG_IMPL:org.apache.ibatis.logging.stdout.StdOutImpl}

# 日志配置
logging:
  level:
    root: ${LOG_LEVEL_ROOT:info}
    com.secondhand.marketplace.backend: ${LOG_LEVEL_APP:debug}
    org.springframework.web: ${LOG_LEVEL_WEB:info}
    org.springframework.security: ${LOG_LEVEL_SECURITY:info}

# 测试配置
test:
  enabled: ${TEST_ENABLED:false}
  default-user-id: 10001
  default-admin-id: 1