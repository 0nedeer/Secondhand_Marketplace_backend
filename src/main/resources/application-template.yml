# 配置文件模板 - 复制为 application-{环境名}.yml 使用
# 使用方法：复制本文件为 application-dev.yml、application-test.yml 等

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/secondhand_marketplace?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false
    username: root
    password: your_password

  data:
    redis:
      host: localhost
      port: 6379
      password: your_redis_password
      database: 0

jwt:
  secret: your_jwt_secret_key_must_be_at_least_32_characters
  expiration: 86400000
  reset-expiration: 300000

minio:
  endpoint: http://localhost:9000
  accessKey: your_minio_access_key
  secretKey: your_minio_secret_key
  bucketName: filebucket

cors:
  allowed:
    origins: http://localhost:3000,http://localhost:8080,http://127.0.0.1:3000,http://127.0.0.1:8080

logging:
  level:
    root: info
    com.secondhand.marketplace.backend: debug

test:
  enabled: false
  default-user-id: 10001
  default-admin-id: 1